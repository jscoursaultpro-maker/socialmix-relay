<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SocialMix — Classification Pré-Live</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f0f13; color: #fff; margin: 0; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .btn { background: #3b82f6; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 500; }
    .btn:hover { background: #2563eb; }
    .btn-green { background: #10b981; }
    .btn-green:hover { background: #059669; }
    .btn-secondary { background: #374151; }
    .btn-secondary:hover { background: #4b5563; }
    .btn-ia { background: #8b5cf6; }
    .btn-ia:hover { background: #7c3aed; }
    table { width: 100%; border-collapse: collapse; background: #1f2937; border-radius: 8px; overflow: hidden; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #374151; }
    th { background: #111827; font-weight: 600; color: #9ca3af; text-transform: uppercase; font-size: 12px; }
    tr:hover { background: #374151; }
    input, select { background: #111827; color: white; border: 1px solid #4b5563; padding: 6px; border-radius: 4px; width: 100%; }
    input[type="range"] { width: 100px; }
    .audio-player { margin-left: 10px; }
    .pagination { margin-top: 20px; display: flex; gap: 10px; justify-content: center; }
    .track-info { display: flex; align-items: center; gap: 12px; }
    .track-info img { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; }
    .status-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; }
    .status-done { background: #10b98120; color: #10b981; }
    .top-controls { display: flex; gap: 10px; margin-bottom: 15px; }
    .loader { display: none; margin-left: 10px; }
    .energy-val { font-variant-numeric: tabular-nums; display: inline-block; width: 20px; text-align: right; }
    
    /* Login overlay */
    #login-overlay { position: fixed; inset: 0; background: #0f0f13; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .login-box { background: #1f2937; padding: 30px; border-radius: 12px; text-align: center; }
    .login-box input { margin: 15px 0; padding: 10px; font-size: 16px; }
  </style>
</head>
<body>
  <div id="login-overlay">
    <div class="login-box">
      <h2>Connexion Admin</h2>
      <input type="password" id="admin-pwd" placeholder="Mot de passe" />
      <br>
      <button class="btn" onclick="login()">Se connecter</button>
    </div>
  </div>

  <div class="header">
    <div>
      <h1>Classification Pré-Live</h1>
      <p style="color: #9ca3af; margin-top: 5px;">Attribuez une phase, style et ajustez l'energy.</p>
    </div>
    <div style="display: flex; gap: 10px;">
      <button class="btn btn-secondary" onclick="exportData()">Export (régénérer JSON)</button>
      <button class="btn" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <div class="top-controls">
    <select id="filter-phase" style="width: auto;" onchange="loadTracks(1)">
      <option value="missing">Sans phase (Priorité)</option>
      <option value="all">Toutes les tracks</option>
    </select>
    <select id="filter-genre" style="width: auto;" onchange="loadTracks(1)">
      <option value="">Tous les genres</option>
      <option value="Pop">Pop</option>
      <option value="Hip-Hop">Hip-Hop</option>
      <option value="R&B">R&B</option>
      <option value="Electro">Electro</option>
      <option value="House">House</option>
      <option value="Disco">Disco</option>
      <option value="Afro">Afro</option>
      <option value="Latin">Latin</option>
      <option value="Reggaeton">Reggaeton</option>
      <option value="Rock">Rock</option>
      <option value="Chill">Chill</option>
      <option value="COCOVARIET">COCOVARIET</option>
      <option value="Années 80">Années 80</option>
      <option value="Années 90">Années 90</option>
    </select>
  </div>

  <table id="tracks-table">
    <thead>
      <tr>
        <th>Track</th>
        <th>Genre</th>
        <th>BPM</th>
        <th style="width: 150px;">Phase</th>
        <th style="width: 150px;">Style (opt)</th>
        <th style="width: 150px;">Energy</th>
        <th style="width: 200px;">Actions</th>
      </tr>
    </thead>
    <tbody id="tracks-body">
      <tr><td colspan="7" style="text-align:center;">Chargement...</td></tr>
    </tbody>
  </table>

  <div class="pagination" id="pagination"></div>

  <audio id="global-player" style="display:none"></audio>

  <script>
    let token = localStorage.getItem('adminToken');
    if (token) document.getElementById('login-overlay').style.display = 'none';

    async function login() {
      const pwd = document.getElementById('admin-pwd').value;
      const res = await fetch('/api/admin/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd })
      });
      if (res.ok) {
        const data = await res.json();
        token = data.token;
        localStorage.setItem('adminToken', token);
        document.getElementById('login-overlay').style.display = 'none';
        loadTracks();
      } else {
        alert('Mot de passe incorrect');
      }
    }

    function logout() {
      localStorage.removeItem('adminToken');
      location.reload();
    }

    const headers = () => ({
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json'
    });

    let currentPage = 1;
    let playingBtn = null;
    let playingId = null;

    async function loadTracks(page = currentPage) {
      currentPage = page;
      const phaseFilter = document.getElementById('filter-phase').value;
      const genreFilter = document.getElementById('filter-genre').value;
      
      const tbody = document.getElementById('tracks-body');
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">Chargement...</td></tr>';

      let url = `/api/admin/classify/tracks?page=${page}&limit=30`;
      if (phaseFilter === 'missing') url += `&phase=missing`;
      if (genreFilter) url += `&genre=${encodeURIComponent(genreFilter)}`;

      try {
        const res = await fetch(url, { headers: headers() });
        if (res.status === 403 || res.status === 401) return logout();
        const data = await res.json();
        
        renderTracks(data.tracks);
        renderPagination(data.page, data.totalPages);
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color: #ef4444;">Erreur: ${err.message}</td></tr>`;
      }
    }

    function renderTracks(tracks) {
      const tbody = document.getElementById('tracks-body');
      tbody.innerHTML = '';
      if (tracks.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">Aucune track trouvée</td></tr>';
        return;
      }

      tracks.forEach(t => {
        const tr = document.createElement('tr');
        tr.id = `row-${t._id}`;
        tr.innerHTML = `
          <td>
            <div class="track-info">
              <img src="${t.coverArtURL || 'https://via.placeholder.com/40'}" onerror="this.src='https://via.placeholder.com/40'">
              <div>
                <div style="font-weight: 600;">${t.title}</div>
                <div style="color: #9ca3af; font-size: 13px;">${t.artist}</div>
                <div style="margin-top: 4px;">
                  <button class="btn btn-secondary" style="padding: 2px 8px; font-size: 12px;" onclick="playPreview('${t.deezerId}', this, '${t._id}')">▶️ Play</button>
                  ${t.phase ? '<span class="status-badge status-done">DONE</span>' : ''}
                </div>
              </div>
            </div>
          </td>
          <td><span style="color:#9ca3af; font-size:13px;">${t.genre || 'Inconnu'}</span></td>
          <td><span style="color:#9ca3af; font-size:13px;">${t.bpm || 0}</span></td>
          <td>
            <select id="phase-${t._id}">
              <option value="" ${!t.phase ? 'selected' : ''}>-- Choisir --</option>
              <option value="arrival" ${t.phase === 'arrival' ? 'selected' : ''}>Arrival (Warm-up)</option>
              <option value="ambiance" ${t.phase === 'ambiance' ? 'selected' : ''}>Ambiance (Discussion)</option>
              <option value="takeoff" ${t.phase === 'takeoff' ? 'selected' : ''}>Takeoff (Montée)</option>
              <option value="groove" ${t.phase === 'groove' ? 'selected' : ''}>Groove (Dance soft)</option>
              <option value="party" ${t.phase === 'party' ? 'selected' : ''}>Party (Peak time)</option>
              <option value="closing" ${t.phase === 'closing' ? 'selected' : ''}>Closing (Fin)</option>
            </select>
          </td>
          <td>
            <input type="text" id="style-${t._id}" value="${t.style || ''}" placeholder="Ex: Deep House" />
          </td>
          <td>
            <input type="range" id="energy-${t._id}" min="1" max="10" value="${t.energy || 5}" oninput="document.getElementById('energy-val-${t._id}').innerText = this.value" />
            <span class="energy-val" id="energy-val-${t._id}">${t.energy || 5}</span>
          </td>
          <td style="display: flex; gap: 6px; flex-wrap: wrap;">
            <button class="btn btn-green" onclick="saveTrack('${t._id}')">✅ Valider</button>
            <button class="btn btn-ia" onclick="suggestIA('${t._id}', '${t.title.replace(/'/g, "\\'")}', '${t.artist.replace(/'/g, "\\'")}', '${t.genre}')">🪄 Suggère IA</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function renderPagination(page, total) {
      const div = document.getElementById('pagination');
      div.innerHTML = '';
      if (total <= 1) return;

      if (page > 1) {
        const btn = document.createElement('button');
        btn.className = 'btn btn-secondary';
        btn.innerText = 'Précédent';
        btn.onclick = () => loadTracks(page - 1);
        div.appendChild(btn);
      }
      
      const span = document.createElement('span');
      span.style.padding = '8px 16px';
      span.innerText = `Page ${page} / ${total}`;
      div.appendChild(span);

      if (page < total) {
        const btn = document.createElement('button');
        btn.className = 'btn btn-secondary';
        btn.innerText = 'Suivant';
        btn.onclick = () => loadTracks(page + 1);
        div.appendChild(btn);
      }
    }

    async function playPreview(deezerId, btnNode, trackId) {
      const audio = document.getElementById('global-player');
      
      if (playingId === trackId && !audio.paused) {
        audio.pause();
        btnNode.innerText = '▶️ Play';
        return;
      }
      
      if (playingBtn) playingBtn.innerText = '▶️ Play';

      btnNode.innerText = '⏳ Load...';
      
      try {
        const res = await fetch(`/api/admin/deezer/preview/${deezerId}`, { headers: headers() });
        const data = await res.json();
        if (data.preview) {
          audio.src = data.preview;
          audio.play();
          btnNode.innerText = '⏸️ Pause';
          playingBtn = btnNode;
          playingId = trackId;
          
          audio.onended = () => { btnNode.innerText = '▶️ Play'; playingBtn = null; playingId = null; };
        } else {
          btnNode.innerText = '❌ Pas de preview';
          setTimeout(() => btnNode.innerText = '▶️ Play', 2000);
        }
      } catch (err) {
        btnNode.innerText = '❌ Erreur';
        setTimeout(() => btnNode.innerText = '▶️ Play', 2000);
      }
    }

    async function saveTrack(id) {
      const phase = document.getElementById(`phase-${id}`).value;
      const style = document.getElementById(`style-${id}`).value;
      const energy = document.getElementById(`energy-${id}`).value;

      const btn = document.querySelector(`#row-${id} .btn-green`);
      btn.innerText = '⏳...';

      try {
        const res = await fetch(`/api/admin/tracks/${id}`, {
          method: 'PATCH',
          headers: headers(),
          body: JSON.stringify({ phase: phase || null, style: style || null, energy: Number(energy) })
        });
        if (res.ok) {
          btn.innerText = '✅ OK';
          btn.style.background = '#059669';
          setTimeout(() => { btn.innerText = '✅ Valider'; btn.style.background = ''; }, 1500);
          
          // Optionally add DONE badge
          const info = document.querySelector(`#row-${id} .track-info > div > div:last-child`);
          if (!info.querySelector('.status-done') && phase) {
            info.innerHTML += '<span class="status-badge status-done" style="margin-left: 8px;">DONE</span>';
          }
        } else {
          btn.innerText = '❌ Erreur';
        }
      } catch (err) {
        btn.innerText = '❌ Erreur';
      }
    }

    async function suggestIA(id, title, artist, genre) {
      const btn = document.querySelector(`#row-${id} .btn-ia`);
      const originalText = btn.innerText;
      btn.innerText = '🪄 Loading...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/admin/classify/suggest', {
          method: 'POST',
          headers: headers(),
          body: JSON.stringify({ title, artist, genre })
        });
        const data = await res.json();
        
        if (data.suggestion) {
          if (data.suggestion.phase) document.getElementById(`phase-${id}`).value = data.suggestion.phase;
          if (data.suggestion.style) document.getElementById(`style-${id}`).value = data.suggestion.style;
          if (data.suggestion.energy) {
            const e = document.getElementById(`energy-${id}`);
            e.value = data.suggestion.energy;
            document.getElementById(`energy-val-${id}`).innerText = data.suggestion.energy;
          }
          alert(`IA suggère:\nPhase: ${data.suggestion.phase}\nStyle: ${data.suggestion.style}\nEnergy: ${data.suggestion.energy}\nRaison: ${data.suggestion.reason}`);
        } else {
          alert('Impossible d\'obtenir une suggestion IA');
        }
      } catch (err) {
        alert('Erreur IA: ' + err.message);
      } finally {
        btn.innerText = originalText;
        btn.disabled = false;
      }
    }

    async function exportData() {
      const btn = document.querySelector('.header .btn-secondary');
      const originalText = btn.innerText;
      btn.innerText = '⏳ Export en cours...';
      
      try {
        const res = await fetch('/api/admin/export/rebuild', { method: 'POST', headers: headers() });
        const data = await res.json();
        if (res.ok) {
          alert(data.message || 'Export réussi ! Les JSON sont à jour.');
        } else {
          alert('Erreur: ' + data.error);
        }
      } catch (err) {
        alert('Erreur serveur lors de l\'export');
      } finally {
        btn.innerText = originalText;
      }
    }

    if (token) loadTracks();
  </script>
</body>
</html>
