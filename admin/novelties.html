<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AhOuai — Nouveautés & Découvertes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f0f13; color: #fff; margin: 0; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto 30px auto; }
    .header h1 { margin: 0; font-size: 24px; display: flex; align-items: center; gap: 10px; }
    .btn { background: #3b82f6; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: 500; }
    .btn:hover { background: #2563eb; }
    
    .container { max-width: 1000px; margin: 0 auto; background: #1f2937; border-radius: 12px; border: 1px solid #374151; overflow: hidden; }
    
    .table-header { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; padding: 15px 20px; background: #111827; font-size: 13px; font-weight: 600; color: #9ca3af; border-bottom: 1px solid #374151; }
    .row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; padding: 15px 20px; border-bottom: 1px solid #374151; align-items: center; }
    .row:last-child { border-bottom: none; }
    .row:hover { background: #374151; }
    
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; margin-right: 5px; }
    .badge-orange { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
    .badge-blue { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
    .badge-gray { background: rgba(255, 255, 255, 0.1); color: #d1d5db; }
    
    .track-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
    .track-artist { color: #9ca3af; font-size: 13px; }
    
    .stat-plays { font-weight: 600; }
    .stat-feu { color: #f59e0b; font-weight: 600; }
    
    .loading { text-align: center; padding: 50px; color: #9ca3af; }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <h1>🆕 Nouveautés & Découvertes</h1>
      <p style="color: #9ca3af; margin-top: 5px; font-size: 14px;">Suivi des imports récents et suggestions de la communauté.</p>
    </div>
    <a href="/admin/hub" class="btn" style="background: #4b5563;">🏠 Hub</a>
  </div>

  <div class="container">
    <div class="table-header">
      <div>Titre & Artiste</div>
      <div>Source</div>
      <div>Classification</div>
      <div>Performance</div>
    </div>
    <div id="novelties-body">
      <div class="loading">Chargement des données...</div>
    </div>
  </div>

  <script>
    async function loadNovelties() {
      const token = localStorage.getItem('sm_admin_token') || localStorage.getItem('adminToken');
      if (!token) {
        document.getElementById('novelties-body').innerHTML = '<div class="loading" style="color:#ef4444;">Non autorisé. Veuillez vous connecter au Hub d\'abord.</div>';
        return;
      }
      
      try {
        const res = await fetch('/api/admin/stats', {
          headers: { 'x-admin-token': token, 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Erreur API');
        
        const data = await res.json();
        const novelties = data.novelties || [];
        
        if (novelties.length === 0) {
          document.getElementById('novelties-body').innerHTML = '<div class="loading">Aucune nouveauté récente trouvée.</div>';
          return;
        }
        
        const html = novelties.map(t => {
          const suggestBadge = t.suggestCount > 0 ? `<span class="badge badge-orange">${t.suggestCount} Sugg.</span>` : '';
          const sourceBadge = t.source === 'guest_suggestion' || t.source === 'host_suggestion' ? '<span class="badge badge-blue">Guest</span>' : `<span class="badge badge-gray">${t.source || 'Nouveau'}</span>`;
          
          const perfPlays = t.performance?.totalPlays > 0 ? `<div class="stat-plays">${t.performance.totalPlays} plays</div>` : '<div style="color:#9ca3af; font-size:13px;">Jamais joué</div>';
          const perfFeu = t.performance?.totalPlays > 0 ? `<div class="stat-feu">${(t.performance.feuRatio * 100).toFixed(0)}% 🔥</div>` : '';
          
          const bpmBadge = t.bpm > 0 ? `<span class="badge badge-gray">${t.bpm} BPM</span>` : '';
          const energyBadge = t.energy > 0 ? `<span class="badge badge-gray">E:${t.energy}</span>` : '';
          const phaseBadge = t.phase ? `<span class="badge badge-blue" style="background: rgba(16, 185, 129, 0.2); color: #10b981;">${t.phase}</span>` : '';

          return `
            <div class="row">
              <div>
                <div class="track-title">${esc(t.title)}</div>
                <div class="track-artist">${esc(t.artist)}</div>
              </div>
              <div>
                ${suggestBadge} ${sourceBadge}
              </div>
              <div>
                <div style="font-weight:500; margin-bottom:4px; font-size:14px;">${esc(t.genre || 'Inconnu')}</div>
                ${bpmBadge} ${energyBadge} ${phaseBadge}
              </div>
              <div>
                ${perfPlays}
                ${perfFeu}
              </div>
            </div>
          `;
        }).join('');
        
        document.getElementById('novelties-body').innerHTML = html;
        
      } catch (e) {
        document.getElementById('novelties-body').innerHTML = `<div class="loading" style="color:#ef4444;">Erreur: ${e.message}</div>`;
      }
    }
    
    function esc(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    
    loadNovelties();
  </script>
</body>
</html>
