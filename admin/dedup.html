<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AhOuai — Déduplication</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0f0f13; color: #fff; padding: 20px; }
    
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #374151; }
    .header h1 { font-size: 1.8rem; }
    .header p { color: #9ca3af; font-size: 14px; margin-top: 4px; }
    
    .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 600; transition: all 0.2s; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: #374151; color: white; }
    .btn-secondary:hover { background: #4b5563; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-success { background: #10b981; color: white; }
    .btn-success:hover { background: #059669; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    
    .info-bar { background: #1f2937; border: 1px solid #374151; border-radius: 10px; padding: 15px 20px; margin-bottom: 25px; display: flex; gap: 30px; align-items: center; }
    .info-bar .stat { text-align: center; }
    .info-bar .stat .number { font-size: 2rem; font-weight: 700; }
    .info-bar .stat .label { font-size: 12px; color: #9ca3af; }
    
    .dupe-group { background: #1f2937; border: 1px solid #374151; border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
    .dupe-group-header { padding: 15px 20px; background: #111827; border-bottom: 1px solid #374151; display: flex; justify-content: space-between; align-items: center; }
    .dupe-group-header h3 { font-size: 16px; }
    .dupe-group-header .badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; background: rgba(239,68,68,0.2); color: #ef4444; font-weight: 700; }
    
    .track-row { display: grid; grid-template-columns: 60px 1fr 1fr 1fr 1fr auto; gap: 15px; align-items: center; padding: 15px 20px; border-bottom: 1px solid #1f2937; }
    .track-row:last-child { border-bottom: none; }
    .track-row.winner { background: rgba(16, 185, 129, 0.05); border-left: 3px solid #10b981; }
    
    .cover { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; }
    .track-title { font-weight: 600; font-size: 14px; }
    .track-artist { color: #9ca3af; font-size: 13px; margin-top: 3px; }
    .track-meta { font-size: 13px; color: #9ca3af; }
    
    .quality-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .quality-platine { background: rgba(234,179,8,0.2); color: #eab308; }
    .quality-complete { background: rgba(59,130,246,0.2); color: #3b82f6; }
    .quality-partielle { background: rgba(245,158,11,0.2); color: #f59e0b; }
    .quality-vide { background: rgba(107,114,128,0.2); color: #6b7280; }
    
    .actions { display: flex; gap: 8px; }
    .action-btn { padding: 6px 12px; border-radius: 6px; font-size: 12px; border: none; cursor: pointer; font-family: inherit; font-weight: 600; transition: all 0.2s; }
    .keep-btn { background: #10b981; color: white; }
    .keep-btn:hover { background: #059669; }
    .delete-btn { background: rgba(239,68,68,0.2); color: #ef4444; border: 1px solid #ef4444; }
    .delete-btn:hover { background: #ef4444; color: white; }
    
    .resolved { opacity: 0.4; pointer-events: none; }
    .resolved-badge { display: inline-block; background: rgba(16,185,129,0.2); color: #10b981; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
    
    #login-overlay { position: fixed; inset: 0; background: #0f0f13; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    .login-box { background: #1f2937; padding: 30px; border-radius: 12px; text-align: center; }
    .login-box input { display: block; width: 100%; margin: 15px 0; padding: 10px; font-size: 16px; background: #111827; color: white; border: 1px solid #4b5563; border-radius: 4px; }
    
    .empty-state { text-align: center; padding: 60px; color: #9ca3af; }
    .empty-state .big { font-size: 3rem; margin-bottom: 15px; }
  </style>
</head>
<body>
  <div id="login-overlay">
    <div class="login-box">
      <h2>Connexion Admin</h2>
      <input type="password" id="admin-pwd" placeholder="Mot de passe" />
      <button class="btn btn-primary" style="width:100%;" onclick="login()">Se connecter</button>
    </div>
  </div>

  <div class="header">
    <div>
      <h1>🔁 Gestion des Doublons</h1>
      <p>Identifier et résoudre les titres dupliqués dans la base de données</p>
    </div>
    <div style="display: flex; gap: 10px;">
      <a href="/admin/hub" class="btn btn-secondary" style="text-decoration:none;">🏠 Hub</a>
      <button class="btn btn-primary" onclick="loadDupes()">🔄 Rafraîchir</button>
    </div>
  </div>

  <div class="info-bar" id="info-bar">
    <div class="stat"><div class="number" id="total-tracks">—</div><div class="label">Tracks total</div></div>
    <div class="stat"><div class="number" id="dupe-groups" style="color:#ef4444">—</div><div class="label">Groupes doublons</div></div>
    <div class="stat"><div class="number" id="extra-tracks" style="color:#f59e0b">—</div><div class="label">Tracks en trop</div></div>
    <div class="stat"><div class="number" id="resolved-count" style="color:#10b981">0</div><div class="label">Résolus</div></div>
  </div>

  <div id="dupes-container">
    <div class="empty-state"><div class="big">⏳</div>Chargement...</div>
  </div>

  <script>
    let token = localStorage.getItem('adminToken');
    if (token) { document.getElementById('login-overlay').style.display = 'none'; loadDupes(); }
    const headers = () => ({ 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' });
    
    async function login() {
      const pwd = document.getElementById('admin-pwd').value;
      const res = await fetch('/api/admin/auth', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pwd }) });
      if (res.ok) {
        const data = await res.json();
        token = data.token;
        localStorage.setItem('adminToken', token);
        document.getElementById('login-overlay').style.display = 'none';
        loadDupes();
      } else { alert('Mot de passe incorrect'); }
    }

    let resolvedCount = 0;

    async function loadDupes() {
      const container = document.getElementById('dupes-container');
      container.innerHTML = '<div class="empty-state"><div class="big">⏳</div>Analyse en cours...</div>';
      
      const [dupesRes, totalRes] = await Promise.all([
        fetch('/api/admin/dedup/list', { headers: headers() }),
        fetch('/api/admin/dedup/stats', { headers: headers() })
      ]);
      
      const { groups } = await dupesRes.json();
      const { total, dupeGroups, extraTracks } = await totalRes.json();
      
      document.getElementById('total-tracks').innerText = total;
      document.getElementById('dupe-groups').innerText = dupeGroups;
      document.getElementById('extra-tracks').innerText = extraTracks;
      document.getElementById('resolved-count').innerText = resolvedCount;
      
      if (groups.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="big">✅</div><strong>Aucun doublon détecté !</strong><br>Ta base est propre.</div>';
        return;
      }
      
      container.innerHTML = '';
      groups.forEach(g => container.appendChild(renderGroup(g)));
    }

    function qualityBadge(q) {
      const cls = { platine: 'quality-platine', complete: 'quality-complete', partielle: 'quality-partielle', vide: 'quality-vide' }[q] || 'quality-vide';
      return `<span class="quality-badge ${cls}">${q || 'vide'}</span>`;
    }

    function renderGroup(g) {
      const div = document.createElement('div');
      div.className = 'dupe-group';
      div.id = `group-${g.tracks[0]._id}`;
      
      div.innerHTML = `
        <div class="dupe-group-header">
          <h3>${g.tracks[0].title} — ${g.tracks[0].artist || ''}</h3>
          <span class="badge">${g.tracks.length} copies</span>
        </div>
      `;
      
      g.tracks.forEach((t, i) => {
        const row = document.createElement('div');
        row.className = 'track-row';
        row.id = `track-row-${t._id}`;
        
        const deezerImg = t.providers?.deezer?.albumId 
          ? `https://api.deezer.com/album/${t.providers.deezer.albumId}/image`
          : 'https://via.placeholder.com/50';
        
        row.innerHTML = `
          <img class="cover" src="${deezerImg}" onerror="this.src='https://via.placeholder.com/50'">
          <div>
            <div class="track-title">${t.title}</div>
            <div class="track-artist">${t.artist || '—'}</div>
          </div>
          <div class="track-meta">${qualityBadge(t.qualityLevel)}</div>
          <div class="track-meta">
            Phase: <strong>${t.phase || '—'}</strong><br>
            ${t.isBanger ? '🟢 IN' : t.isFiller ? '🔴 Filler' : '⚪ Backlog'}
          </div>
          <div class="track-meta" style="font-size:12px;">
            BPM: ${t.bpm || '—'}<br>
            Src: ${t.source || '—'}
          </div>
          <div class="actions">
            <button class="action-btn keep-btn" onclick="keepThis('${g.tracks[0]._id}', '${t._id}', ${JSON.stringify(g.tracks.map(x => x._id))})">✅ Garder</button>
          </div>
        `;
        div.appendChild(row);
      });
      
      return div;
    }

    async function keepThis(groupKey, keepId, allIds) {
      const toDelete = allIds.filter(id => id !== keepId);
      
      const res = await fetch('/api/admin/dedup/resolve', {
        method: 'POST',
        headers: headers(),
        body: JSON.stringify({ keepId, deleteIds: toDelete })
      });
      
      if (res.ok) {
        resolvedCount++;
        document.getElementById('resolved-count').innerText = resolvedCount;
        const group = document.getElementById(`group-${groupKey}`);
        if (group) {
          group.innerHTML = `<div style="padding:15px 20px; display:flex; align-items:center; gap:15px; color:#9ca3af;">
            <span class="resolved-badge">✅ Résolu</span>
            <span>Gardé: ${keepId} | Supprimés: ${toDelete.length}</span>
          </div>`;
        }
      } else {
        alert('Erreur lors de la suppression');
      }
    }
  </script>
</body>
</html>
