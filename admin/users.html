<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ahouai — Users Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .stats-bar { display: flex; gap: 15px; font-size: 0.95rem; color: #9ca3af; }
    .stats-bar span { background: #1f2937; padding: 6px 12px; border-radius: 8px; }
    .actions-bar { display: flex; gap: 10px; }
    .table-container { background: #1f2937; border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 12px 16px; border-bottom: 1px solid #374151; }
    th { background: #111827; color: #9ca3af; font-weight: 500; font-size: 0.85rem; text-transform: uppercase; }
    tr:last-child td { border-bottom: none; }
    tr:hover { background: #374151; }
    .photo-cell { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #374151; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
    .btn-action { background: none; border: none; color: #9ca3af; cursor: pointer; padding: 4px; border-radius: 4px; }
    .btn-action:hover { color: #fff; background: #4b5563; }
    .pagination-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; color: #9ca3af; }
    .pagination-controls { display: flex; gap: 8px; }
    
    /* User Detail Modal */
    .user-modal { padding: 20px; max-width: 600px; width: 100%; }
    .user-header { display: flex; gap: 20px; margin-bottom: 20px; }
    .user-header .photo { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; background: #374151; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
    .user-info h2 { margin: 0 0 5px 0; }
    .user-info p { margin: 0; color: #9ca3af; }
    .danger-zone { margin-top: 30px; padding-top: 20px; border-top: 1px solid #ef4444; }
    .danger-zone button { margin-right: 10px; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div id="app" class="screen active">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-logo">
        <span class="logo-icon">🎧</span>
        <span class="logo-text">Ahouai</span>
      </div>
      <ul class="nav-links">
        <li><a href="/admin/index.html" class="nav-link">
          <span class="nav-icon">📊</span><span>Dashboard</span>
        </a></li>
        <li><a href="#" class="nav-link active">
          <span class="nav-icon">👥</span><span>Users Management</span>
        </a></li>
      </ul>
      <div class="sidebar-footer">
        <a href="/admin/hub.html" class="btn-ghost" style="display: block; text-align: center; text-decoration: none;">Retour Hub</a>
      </div>
    </nav>

    <!-- Main content -->
    <main class="main-content">
      <div class="page-header">
        <h2>Users Management</h2>
        <p class="page-sub">Gestion des comptes utilisateurs, bannissements et données</p>
      </div>

      <div class="top-bar">
        <div class="stats-bar">
          <span id="stat-total">Total: --</span>
          <span id="stat-active7">Actifs 7j: --</span>
          <span id="stat-active30">Actifs 30j: --</span>
        </div>
        <div class="actions-bar">
          <input type="text" id="search-input" placeholder="🔍 Chercher email/nom..." class="input" />
          <select id="provider-filter" class="input">
            <option value="">All Providers</option>
            <option value="apple">Apple</option>
            <option value="google">Google</option>
            <option value="email">Email</option>
          </select>
        </div>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Photo</th>
              <th>Nom</th>
              <th>Email</th>
              <th>Provider</th>
              <th>Soirées</th>
              <th>Créé le</th>
              <th>Statut</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="users-tbody">
            <!-- Users will be injected here -->
          </tbody>
        </table>
      </div>

      <div class="pagination-bar">
        <span id="page-info">Page 1 / 1 - 0 utilisateurs</span>
        <div class="pagination-controls">
          <button id="btn-prev" class="btn btn-secondary" disabled>Précédent</button>
          <button id="btn-next" class="btn btn-secondary" disabled>Suivant</button>
        </div>
      </div>
    </main>
  </div>

  <!-- User Detail Modal -->
  <div id="user-modal" class="modal-overlay hidden">
    <div class="modal-card user-modal">
      <div class="modal-header">
        <h3>Détail Utilisateur</h3>
        <button id="modal-close" class="btn-icon-close">✕</button>
      </div>
      <div id="user-detail-content">
        <!-- Content injected dynamically -->
      </div>
    </div>
  </div>

  <script>
    // Configuration
    const API_URL = '/api/admin/users';
    let currentPage = 1;
    let currentLimit = 20;
    
    // Auth check — SSO : lit adminToken (hub) en fallback de socialmix_admin_token
    const adminToken = localStorage.getItem('socialmix_admin_token') || localStorage.getItem('adminToken');
    if (!adminToken) {
      window.location.href = '/admin/hub';
    }
    // Synchroniser pour les prochains appels
    if (adminToken) {
      localStorage.setItem('socialmix_admin_token', adminToken);
      localStorage.setItem('adminToken', adminToken);
    }
    
    const headers = {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${adminToken}`
    };

    // Elements
    const tbody = document.getElementById('users-tbody');
    const statTotal = document.getElementById('stat-total');
    const statActive7 = document.getElementById('stat-active7');
    const statActive30 = document.getElementById('stat-active30');
    const searchInput = document.getElementById('search-input');
    const providerFilter = document.getElementById('provider-filter');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const pageInfo = document.getElementById('page-info');
    
    const modal = document.getElementById('user-modal');
    const modalContent = document.getElementById('user-detail-content');
    const modalClose = document.getElementById('modal-close');

    // Events
    searchInput.addEventListener('input', debounce(loadUsers, 500));
    providerFilter.addEventListener('change', () => { currentPage = 1; loadUsers(); });
    btnPrev.addEventListener('click', () => { if (currentPage > 1) { currentPage--; loadUsers(); } });
    btnNext.addEventListener('click', () => { currentPage++; loadUsers(); });
    modalClose.addEventListener('click', () => modal.classList.add('hidden'));

    async function loadUsers() {
      try {
        const search = searchInput.value;
        const provider = providerFilter.value;
        const res = await fetch(`${API_URL}?page=${currentPage}&limit=${currentLimit}&search=${search}&provider=${provider}`, { headers });
        
        if (res.status === 401) {
          localStorage.removeItem('socialmix_admin_token');
          window.location.href = '/admin/index.html';
          return;
        }
        
        const data = await res.json();
        renderTable(data.users);
        updatePagination(data.total, data.page, data.totalPages);
        
        // Update stats (only from the first load or basic summary API if provided, here we assume it's part of the response or we just show totals)
        statTotal.textContent = `Total: ${data.total}`;
        statActive7.textContent = `Actifs 7j: ${data.active7 || '--'}`;
        statActive30.textContent = `Actifs 30j: ${data.active30 || '--'}`;
      } catch (err) {
        console.error('Error loading users:', err);
      }
    }

    function renderTable(users) {
      tbody.innerHTML = '';
      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">Aucun utilisateur trouvé</td></tr>';
        return;
      }
      
      users.forEach(user => {
        const photo = user.profile?.photoURL ? `<img src="${user.profile.photoURL}" class="photo-cell" />` : `<div class="photo-cell">${user.profile?.emoji || '👤'}</div>`;
        const emailObscured = user.email ? user.email.replace(/(.{2})(.*)(@.*)/, "$1***$3") : '--';
        const date = new Date(user.createdAt).toLocaleDateString();
        let status = '✅';
        if (user.isDeleted) status = '🗑️';
        else if (user.isBanned) status = '🚫';
        
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${photo}</td>
          <td>${user.profile?.firstName || '--'}</td>
          <td>${emailObscured}</td>
          <td>${user.authProvider}</td>
          <td>${user.partiesAttended?.length || 0}</td>
          <td>${date}</td>
          <td>${status}</td>
          <td>
            <button class="btn-action" onclick="viewUser('${user._id}')">👁</button>
            ${!user.isDeleted && !user.isBanned ? `<button class="btn-action" onclick="banUser('${user._id}')">🚫</button>` : ''}
            ${user.isBanned ? `<button class="btn-action" onclick="unbanUser('${user._id}')">✅</button>` : ''}
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function updatePagination(total, page, totalPages) {
      pageInfo.textContent = `Page ${page} / ${totalPages} - ${total} utilisateurs`;
      btnPrev.disabled = page <= 1;
      btnNext.disabled = page >= totalPages;
      currentPage = page;
    }

    async function viewUser(id) {
      try {
        const res = await fetch(`${API_URL}/${id}`, { headers });
        const user = await res.json();
        
        const photo = user.profile?.photoURL ? `<img src="${user.profile.photoURL}" class="photo" />` : `<div class="photo">${user.profile?.emoji || '👤'}</div>`;
        const date = new Date(user.createdAt).toLocaleString();
        const lastSeen = user.lastSeenAt ? new Date(user.lastSeenAt).toLocaleString() : '--';
        
        modalContent.innerHTML = `
          <div class="user-header">
            ${photo}
            <div class="user-info">
              <h2>${user.profile?.firstName || 'Unknown'} ${user.profile?.emoji || ''}</h2>
              <p>${user.email}</p>
              <p>Provider: <strong>${user.authProvider}</strong> (${user.providerId})</p>
            </div>
          </div>
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
            <div><strong>Créé le:</strong> ${date}</div>
            <div><strong>Dernière vue:</strong> ${lastSeen}</div>
            <div><strong>Soirées:</strong> ${user.partiesAttended?.length || 0}</div>
            <div><strong>Amis:</strong> ${user.friends?.length || 0}</div>
            <div><strong>Statut:</strong> ${user.isDeleted ? 'Supprimé' : (user.isBanned ? 'Banni' : 'Actif')}</div>
          </div>
          
          <div class="danger-zone">
            <h4>Actions Dangereuses</h4>
            <button class="btn btn-secondary" onclick="forceLogout('${user._id}')">Forcer Déconnexion</button>
            <button class="btn btn-secondary" onclick="window.open('/api/admin/users/${user._id}/export?token=${adminToken}')">Export JSON (RGPD)</button>
            ${!user.isBanned && !user.isDeleted ? `<button class="btn btn-secondary" style="color:#ef4444;" onclick="banUser('${user._id}')">Bannir</button>` : ''}
            ${user.isBanned && !user.isDeleted ? `<button class="btn btn-secondary" onclick="unbanUser('${user._id}')">Débannir</button>` : ''}
            ${!user.isDeleted ? `<button class="btn btn-secondary" style="color:#ef4444; border-color:#ef4444;" onclick="anonymizeUser('${user._id}')">Anonymiser (RGPD Soft Delete)</button>` : ''}
          </div>
        `;
        modal.classList.remove('hidden');
      } catch (err) {
        alert('Erreur lors du chargement de l\'utilisateur');
      }
    }

    async function forceLogout(id) {
      if(!confirm('Déconnecter cet utilisateur ?')) return;
      await fetch(`${API_URL}/${id}/force-logout`, { method: 'POST', headers });
      alert('Utilisateur déconnecté (Refresh token invalidé)');
    }

    async function banUser(id) {
      if(!confirm('Bannir cet utilisateur ?')) return;
      await fetch(`${API_URL}/${id}/ban`, { method: 'POST', headers });
      loadUsers();
      modal.classList.add('hidden');
    }

    async function unbanUser(id) {
      if(!confirm('Débannir cet utilisateur ?')) return;
      await fetch(`${API_URL}/${id}/unban`, { method: 'POST', headers });
      loadUsers();
      modal.classList.add('hidden');
    }

    async function anonymizeUser(id) {
      if(!prompt('Tapez SUPPRIMER pour confirmer l\'anonymisation RGPD de ce compte :') === 'SUPPRIMER') return;
      await fetch(`${API_URL}/${id}/anonymize`, { method: 'POST', headers });
      loadUsers();
      modal.classList.add('hidden');
    }

    function debounce(func, wait) {
      let timeout;
      return function executedFunction(...args) {
        const later = () => { clearTimeout(timeout); func(...args); };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
      };
    }

    // Init
    loadUsers();
  </script>
</body>
</html>
